[package]
name = "tokimo-package-sandbox"
version = "0.1.0"
edition = "2021"
authors = ["William Chan <root@williamchan.me>"]
license = "MIT"
description = "Cross-platform native sandbox for running arbitrary commands safely. Linux (bwrap + seccomp), macOS (Seatbelt), Windows (WSL2)."
repository = "https://github.com/tokimo-lab/tokimo-package-sandbox"
homepage = "https://github.com/tokimo-lab/tokimo-package-sandbox"
documentation = "https://docs.rs/tokimo-package-sandbox"
readme = "README.md"
keywords = ["sandbox", "security", "isolation", "seccomp", "seatbelt"]
categories = ["os"]

[features]
default = []
# Opt-in eBPF L4 observer backend (currently scaffold only — see src/l4/ebpf.rs).
ebpf = []

[dependencies]
anyhow = "1.0"
thiserror = "1.0"
tempfile = "3.10"
tracing = "0.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
base64 = "0.22"

[target.'cfg(target_os = "linux")'.dependencies]
nix = { version = "0.29", features = ["process", "signal", "socket", "fs", "event", "ioctl", "term", "uio", "poll"] }
libc = "0.2"
mio = { version = "1", features = ["os-poll", "net", "os-ext"] }

[target.'cfg(target_os = "macos")'.dependencies]
nix = { version = "0.29", features = ["process", "signal"] }
libc = "0.2"
arcbox-vz = "0.1"
tokio = { version = "1", features = ["rt-multi-thread", "time", "sync"] }

[target.'cfg(target_os = "windows")'.dependencies]
windows-sys = { version = "0.59", features = [
    "Win32_System_JobObjects",
    "Win32_Security",
    "Win32_Foundation",
    "Win32_System_Threading",
] }

[dev-dependencies]
tracing-subscriber = "0.3"

[[example]]
name = "basic"
path = "examples/basic.rs"

[[example]]
name = "rm_rf_test"
path = "examples/rm_rf_test.rs"

[[example]]
name = "shell"
path = "examples/shell.rs"

[[example]]
name = "session"
path = "examples/session.rs"

[[example]]
name = "parallel_in_session"
path = "examples/parallel_in_session.rs"

[[example]]
name = "torture_test"
path = "examples/torture_test.rs"

[[example]]
name = "edge_cases"
path = "examples/edge_cases.rs"

[[example]]
name = "gated_network"
path = "examples/gated_network.rs"

[[example]]
name = "l4_observer"
path = "examples/l4_observer.rs"

[[example]]
name = "init_smoke"
path = "examples/init_smoke.rs"
required-features = []

[[example]]
name = "pty_smoke"
path = "examples/pty_smoke.rs"
required-features = []

[[example]]
name = "vz_smoke"
path = "examples/vz_smoke.rs"

[[example]]
name = "hv_smoke"
path = "examples/hv_smoke.rs"

[[bin]]
name = "tokimo-sandbox-init"
path = "src/init/main.rs"
