name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ------------------------------------------------------------------
  # Linux: full build + test (requires bubblewrap)
  # ------------------------------------------------------------------
  linux:
    name: linux (build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install bubblewrap
        run: sudo apt-get update -qq && sudo apt-get install -y -qq bubblewrap

      - name: Build
        run: cargo build --lib --bin tokimo-sandbox-init --tests --examples

      - name: Test
        run: cargo test --lib --bins

  # ------------------------------------------------------------------
  # macOS: build + test (lib only; VZ needs entitlement signing)
  # ------------------------------------------------------------------
  macos:
    name: macOS (build + test)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --lib --tests --examples

      - name: Test
        run: cargo test --lib

  # ------------------------------------------------------------------
  # Windows: build + test (lib + service binary)
  # ------------------------------------------------------------------
  windows:
    name: windows (build + test)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --lib --bin tokimo-sandbox-svc

      - name: Test
        run: cargo test --lib

  # ------------------------------------------------------------------
  # Lint: fmt + clippy (Linux, where all code paths are active)
  # ------------------------------------------------------------------
  lint:
    name: fmt & clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --lib --bin tokimo-sandbox-init --tests -- -D warnings
