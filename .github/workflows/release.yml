name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            suffix: linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: windows-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update -qq && sudo apt-get install -y -qq musl-tools

      - name: Build (library)
        run: cargo build --release --target ${{ matrix.target }} --lib

      - name: Build (binaries)
        run: cargo build --release --target ${{ matrix.target }} --bins

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"
          OUT="tokimo-package-sandbox-${TAG}-${{ matrix.suffix }}"
          mkdir -p "$OUT"
          cp target/${{ matrix.target }}/release/tokimo-sandbox-init "$OUT/" 2>/dev/null || true
          cp target/${{ matrix.target }}/release/tokimo-tun-pump "$OUT/" 2>/dev/null || true
          tar czf "${OUT}.tar.gz" "$OUT"
          echo "ASSET=${OUT}.tar.gz" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF -replace '^refs/tags/',''
          $out = "tokimo-package-sandbox-$tag-${{ matrix.suffix }}"
          New-Item -ItemType Directory -Force -Path $out | Out-Null
          $bins = @('tokimo-sandbox-svc.exe','tokimo-sandbox-init.exe','tokimo-tun-pump.exe')
          foreach ($b in $bins) {
            $src = "target/${{ matrix.target }}/release/$b"
            if (Test-Path $src) { Copy-Item $src $out }
          }
          Compress-Archive -Path $out -DestinationPath "$out.zip"
          echo "ASSET=$out.zip" >> $env:GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.suffix }}
          path: ${{ env.ASSET }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Resolve tag
        id: meta
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          make_latest: true
          generate_release_notes: true
          body: |
            ## tokimo-package-sandbox ${{ steps.meta.outputs.tag }}

            Cross-platform native sandbox with unified smoltcp userspace netstack.

            | Artifact | Platform |
            |----------|----------|
            | `tokimo-package-sandbox-*-linux-x86_64.tar.gz` | Linux x86_64 |
            | `tokimo-package-sandbox-*-macos-arm64.tar.gz` | macOS Apple Silicon |
            | `tokimo-package-sandbox-*-windows-x86_64.zip` | Windows x86_64 |
          files: dist/**/*
