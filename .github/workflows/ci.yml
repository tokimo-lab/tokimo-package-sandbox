name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ------------------------------------------------------------------
  # Linux: full build + test (requires bubblewrap + Debian rootfs)
  # ------------------------------------------------------------------
  linux:
    name: linux (build + test)
    runs-on: ubuntu-latest
    env:
      ROOTFS_VERSION: v1.3.1
      ROOTFS_ASSET: rootfs-amd64.tar.zst
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install bubblewrap + zstd
        run: sudo apt-get update -qq && sudo apt-get install -y -qq bubblewrap zstd

      - name: Allow unprivileged user namespaces
        # Ubuntu 24.04 (ubuntu-latest) restricts unprivileged userns by
        # default via AppArmor, which blocks bwrap from creating the
        # loopback interface inside an unshared network namespace
        # (`bwrap: loopback: Failed RTM_NEWADDR: Operation not permitted`).
        # Disable that restriction so integration tests can use
        # `NetworkPolicy::Blocked` (`bwrap --unshare-net`).
        run: |
          if [ -f /proc/sys/kernel/apparmor_restrict_unprivileged_userns ]; then
            echo 0 | sudo tee /proc/sys/kernel/apparmor_restrict_unprivileged_userns
          fi

      - name: Cache test rootfs
        id: rootfs-cache
        uses: actions/cache@v4
        with:
          path: .test-rootfs
          key: tokimo-test-rootfs-${{ env.ROOTFS_VERSION }}-${{ env.ROOTFS_ASSET }}

      - name: Download + extract rootfs
        if: steps.rootfs-cache.outputs.cache-hit != 'true'
        run: |
          set -euxo pipefail
          mkdir -p .test-rootfs
          curl -sSL -o rootfs.tar.zst \
            "https://github.com/tokimo-lab/tokimo-package-rootfs/releases/download/${ROOTFS_VERSION}/${ROOTFS_ASSET}"
          # Sanity peek at archive layout — must extract to top-level dirs
          # like ./bin, ./usr, etc.
          zstd -d -c rootfs.tar.zst | tar -tf - 2>/dev/null | head -3 || true
          zstd -d -c rootfs.tar.zst | tar -xf - -C .test-rootfs
          rm -f rootfs.tar.zst
          test -x .test-rootfs/usr/bin/bash || test -x .test-rootfs/bin/bash

      - name: Build
        run: cargo build --lib --bins --tests --examples

      - name: Test (lib + bins)
        run: cargo test --lib --bins

      - name: Test (integration tests with rootfs)
        env:
          TOKIMO_TEST_ROOTFS: ${{ github.workspace }}/.test-rootfs
        run: cargo test --tests

  # ------------------------------------------------------------------
  # macOS: build + test (lib only; VZ needs entitlement signing)
  # ------------------------------------------------------------------
  macos:
    name: macOS (build + test)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --lib --bins --tests --examples

      - name: Test
        run: cargo test --lib

  # ------------------------------------------------------------------
  # Windows: build + test (lib + service binary)
  # ------------------------------------------------------------------
  windows:
    name: windows (build + test)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --lib --bins

      - name: Test
        run: cargo test --lib

  # ------------------------------------------------------------------
  # Lint: fmt + clippy (Linux, where all code paths are active)
  # ------------------------------------------------------------------
  lint:
    name: fmt & clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --lib --bins --tests -- -D warnings
